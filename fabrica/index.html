<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fábrica — Companhia de Águas Árticas</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    body { margin: 0; background: #171A1C; min-height: 100vh; display: grid; place-items: center; }
    img { max-width: 100%; max-height: 100vh; display: block; }
    .close {
      position: fixed;
      top: 1rem;
      right: 1rem;
      width: 2.75rem;
      height: 2.75rem;
      display: grid;
      place-items: center;
      font-family: 'Segoe UI', sans-serif;
      font-size: 1.6rem;
      line-height: 1;
      color: #FFFFFF;
      background: rgba(0, 0, 0, 0.45);
      text-decoration: none;
    }
    .close:hover { background: rgba(0, 0, 0, 0.7); }
  </style>
</head>
<body>
  <a class="close" href="/" aria-label="Voltar para cdaa.com.br">&times;</a>
  <img src="/fabrica.png" alt="Fábrica da Companhia de Águas Árticas">
</body>
</html>
