<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fábrica — Companhia de Águas Árticas</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    body {
      margin: 0;
      background: #171A1C;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .frame { position: relative; }
    img {
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      display: block;
    }
    .close {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      width: 2.5rem;
      height: 2.5rem;
      display: grid;
      place-items: center;
      background: #FFFFFF;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
      text-decoration: none;
    }
    .close:hover { background: #E9E9E9; }
    .close svg { display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <a class="close" href="/" aria-label="Voltar para cdaa.com.br">
      <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
        <path d="M1 1 L13 13 M13 1 L1 13" stroke="#171A1C" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </a>
    <img src="/fabrica.png" alt="Fábrica da Companhia de Águas Árticas">
  </div>
</body>
</html>
